name: Prepare Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: Release bump
        required: true
        type: choice
        options:
          - patch
          - minor
          - major

permissions: {}

jobs:
  prepare-release:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: ".python-version"
      - name: Install uv
        uses: astral-sh/setup-uv@v5
      - name: Bump version
        env:
          PREPARE_RELEASE_BUMP: ${{ inputs.bump }}
        run: uv run python scripts/prepare_release.py prepare
      - name: Get new version
        id: version
        run: |
          version="$(uv run python scripts/prepare_release.py current-version)"
          echo "version=$version" >> "$GITHUB_OUTPUT"
      - name: Create release pull request
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail
          branch="release-${VERSION}-${GITHUB_RUN_ID}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git switch -c "$branch"
          git add fastapi_router_versioning/__init__.py
          git commit -m "Release version ${VERSION}"
          git push --set-upstream origin "$branch"
          gh pr create \
            --base main \
            --head "$branch" \
            --title "Release version ${VERSION}" \
            --body "Bump version to ${VERSION}." \
            --label release
